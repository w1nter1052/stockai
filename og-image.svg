<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="0.5" stop-color="#1E3A5F"/>
      <stop offset="1" stop-color="#0F1F38"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative chart lines (subtle background) -->
  <g opacity="0.10" stroke="white" stroke-width="2" fill="none">
    <polyline points="0,520 150,480 300,500 450,400 600,420 750,340 900,300 1050,250 1200,200"/>
    <polyline points="0,560 150,540 300,510 450,520 600,470 750,420 900,400 1050,360 1200,320"/>
  </g>

  <!-- Grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Logo (brand icon) -->
  <g transform="translate(80, 110)">
    <rect width="80" height="80" rx="20" fill="url(#brand)"/>
    <polyline points="20,60 35,42 47,48 60,30 70,20" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="70" cy="20" r="5" fill="white"/>
    <circle cx="20" cy="60" r="3.5" fill="white"/>
  </g>

  <!-- Category Label -->
  <rect x="180" y="135" width="200" height="32" rx="6" fill="url(#badge)" opacity="0.30"/>
  <text x="200" y="158" font-family="'Geist Mono', monospace" font-size="14" font-weight="700" fill="#93C5FD" letter-spacing="2">한국 주식 AI · STOCKAI PRO</text>

  <!-- Main Title -->
  <text x="80" y="290" font-family="Pretendard, sans-serif" font-size="76" font-weight="800" fill="white" letter-spacing="-2">
    내 룰로 분석하는
  </text>
  <text x="80" y="380" font-family="Pretendard, sans-serif" font-size="76" font-weight="800" fill="#93C5FD" letter-spacing="-2">
    AI 주식 비서
  </text>

  <!-- Subtitle -->
  <text x="80" y="450" font-family="Pretendard, sans-serif" font-size="26" font-weight="500" fill="#CBD5E1" letter-spacing="-0.5">
    7가지 검증된 전략 · 매매 일지 · 수익률 추적 · 실시간 알람
  </text>

  <!-- Features chips -->
  <g font-family="Pretendard, sans-serif" font-size="18" font-weight="600">
    <rect x="80" y="500" width="160" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
    <text x="100" y="527" fill="white">📊 7가지 전략</text>

    <rect x="252" y="500" width="160" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
    <text x="272" y="527" fill="white">📔 매매 일지</text>

    <rect x="424" y="500" width="170" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
    <text x="444" y="527" fill="white">🔔 4채널 알람</text>

    <rect x="606" y="500" width="160" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)"/>
    <text x="626" y="527" fill="white">🌡 시장 분석</text>
  </g>

  <!-- Right side: Stock chart illustration -->
  <g transform="translate(820, 120)" opacity="0.95">
    <!-- Card BG -->
    <rect x="0" y="0" width="320" height="380" rx="20" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.10)"/>

    <!-- Stock info -->
    <text x="20" y="40" font-family="Pretendard,sans-serif" font-size="14" font-weight="600" fill="#94A3B8">SAMSUNG ELECTRONICS</text>
    <text x="20" y="76" font-family="'Geist Mono',monospace" font-size="34" font-weight="800" fill="white">85,200원</text>

    <!-- Change indicator -->
    <text x="20" y="106" font-family="'Geist Mono',monospace" font-size="18" font-weight="700" fill="#86EFAC">▲ +3.85% (+3,200)</text>

    <!-- Chart -->
    <g transform="translate(20, 130)">
      <polyline points="0,160 30,150 60,155 90,130 120,140 150,110 180,100 210,90 240,80 270,60" fill="none" stroke="#60A5FA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Fill under line -->
      <polygon points="0,160 30,150 60,155 90,130 120,140 150,110 180,100 210,90 240,80 270,60 270,200 0,200" fill="url(#brand)" opacity="0.20"/>
      <!-- Data point -->
      <circle cx="270" cy="60" r="6" fill="#60A5FA"/>
      <circle cx="270" cy="60" r="3" fill="white"/>
    </g>

    <!-- Signal pill -->
    <rect x="20" y="320" width="100" height="32" rx="16" fill="rgba(224,49,49,0.20)" stroke="#E03131"/>
    <text x="35" y="343" font-family="Pretendard,sans-serif" font-size="14" font-weight="700" fill="#FCA5A5">관심구간</text>

    <text x="135" y="343" font-family="Pretendard,sans-serif" font-size="14" font-weight="500" fill="#94A3B8">신뢰도 82%</text>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="595" font-family="'Geist Mono',monospace" font-size="16" font-weight="600" fill="#64748B" letter-spacing="1">stockai.maeulhang.kr</text>
</svg>
